<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html,body{margin:0;overflow:hidden;background:#fff;}
svg{width:100vw;height:100vh;touch-action:none;}
</style>
</head>
<body>

<svg id="map" viewBox="-3200 -3200 6400 6400">

  <!-- 정확한 30km² 반지름 = 3089m -->
  <defs>
    <clipPath id="clipCircle">
      <circle cx="0" cy="0" r="3089"/>
    </clipPath>
  </defs>

  <g id="viewport">

    <!-- 격자 (원 내부만) -->
    <g clip-path="url(#clipCircle)" stroke="black" stroke-width="4">
      <script><![CDATA[
        const grid = document.currentScript.parentNode;
        const step = 200; // 200m 격자

        for(let x=-3200;x<=3200;x+=step){
          const l=document.createElementNS("http://www.w3.org/2000/svg","line");
          l.setAttribute("x1",x);
          l.setAttribute("y1",-3200);
          l.setAttribute("x2",x);
          l.setAttribute("y2",3200);
          grid.appendChild(l);
        }

        for(let y=-3200;y<=3200;y+=step){
          const l=document.createElementNS("http://www.w3.org/2000/svg","line");
          l.setAttribute("x1",-3200);
          l.setAttribute("y1",y);
          l.setAttribute("x2",3200);
          l.setAttribute("y2",y);
          grid.appendChild(l);
        }
      ]]></script>
    </g>

    <!-- 링 도로 -->
    <circle cx="0" cy="0" r="1000" stroke="black" stroke-width="18" fill="none"/>
    <circle cx="0" cy="0" r="2000" stroke="black" stroke-width="18" fill="none"/>
    <circle cx="0" cy="0" r="2800" stroke="black" stroke-width="18" fill="none"/>

    <!-- 외곽 -->
    <circle cx="0" cy="0" r="3089" stroke="black" stroke-width="28" fill="none"/>

    <!-- 방사 도로 (16개) -->
    <g stroke="black" stroke-width="12">
      <script><![CDATA[
        const g=document.currentScript.parentNode;
        for(let i=0;i<16;i++){
          const a=i*Math.PI*2/16;
          const x=Math.cos(a)*3089;
          const y=Math.sin(a)*3089;

          const line=document.createElementNS("http://www.w3.org/2000/svg","line");
          line.setAttribute("x1",0);
          line.setAttribute("y1",0);
          line.setAttribute("x2",x);
          line.setAttribute("y2",y);

          g.appendChild(line);
        }
      ]]></script>
    </g>

  </g>
</svg>

<script>
const svg=document.getElementById("map");
const vp=document.getElementById("viewport");

let scale=1;
let origin={x:0,y:0};

// 마우스 드래그
let dragging=false,start={x:0,y:0};

svg.onmousedown=e=>{
  dragging=true;
  start={x:e.clientX,y:e.clientY};
};
svg.onmouseup=()=>dragging=false;
svg.onmousemove=e=>{
  if(!dragging)return;
  origin.x+=(e.clientX-start.x)/scale;
  origin.y+=(e.clientY-start.y)/scale;
  start={x:e.clientX,y:e.clientY};
  update();
};

// 휠 줌
svg.onwheel=e=>{
  e.preventDefault();
  scale*=e.deltaY<0?1.1:0.9;
  update();
};

// 터치 (드래그 + 핀치)
let prevDist=null;

svg.ontouchstart=e=>{
  if(e.touches.length===1){
    start={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
};

svg.ontouchmove=e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);

    if(prevDist){
      scale*=dist/prevDist;
    }
    prevDist=dist;
  }
  else if(e.touches.length===1){
    const t=e.touches[0];
    origin.x+=(t.clientX-start.x)/scale;
    origin.y+=(t.clientY-start.y)/scale;
    start={x:t.clientX,y:t.clientY};
  }
  update();
};

svg.ontouchend=()=>{
  prevDist=null;
};

function update(){
  vp.setAttribute("transform",
    `translate(${origin.x},${origin.y}) scale(${scale})`);
}
</script>

</body>
</html>
